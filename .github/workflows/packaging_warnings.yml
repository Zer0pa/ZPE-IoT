name: Packaging Warning Gate

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  packaging_warning_gate:
    name: Packaging warnings treated as errors
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package and capture logs
        run: |
          set -euo pipefail
          python -m build 2>&1 | tee /tmp/python_build.log

      - name: Fail on warnings
        run: |
          if grep -E -i "warning|deprecated|missing readme" /tmp/python_build.log; then
            echo "Packaging warning gate failed"
            exit 1
          fi
