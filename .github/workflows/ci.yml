name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust:
    name: Rust Test + Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo Test
        run: cargo test --all-targets

      - name: Cargo Clippy (warnings denied)
        run: cargo clippy --all-targets -- -D warnings

  python:
    name: Python Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (coverage enforced)
        run: pytest -q

      - name: Build wheel + sdist (warning-free)
        run: python -m build
      - name: Fail on packaging warnings
        run: |
          set -euo pipefail
          python -m build 2>&1 | tee /tmp/python_build.log
          if grep -E -i "warning|deprecated|missing readme" /tmp/python_build.log; then
            echo "Packaging warning gate failed"
            exit 1
          fi

      - name: Fresh env command smoke (full CLI set)
        run: |
          set -euo pipefail
          python -m venv /tmp/zpe_iot_fresh
          /tmp/zpe_iot_fresh/bin/pip install --upgrade pip
          /tmp/zpe_iot_fresh/bin/pip install dist/zpe_iot-*.whl
          cat >/tmp/iot_input.csv <<'CSV'
          index,value
          0,0.0
          1,0.05
          2,0.1
          3,0.15
          4,0.2
          5,0.25
          CSV
          /tmp/zpe_iot_fresh/bin/zpe-iot compress /tmp/iot_input.csv --preset generic --output /tmp/iot_packet.zpk
          /tmp/zpe_iot_fresh/bin/zpe-iot info /tmp/iot_packet.zpk --json
          /tmp/zpe_iot_fresh/bin/zpe-iot decompress /tmp/iot_packet.zpk --output /tmp/iot_restored.csv
          /tmp/zpe_iot_fresh/bin/zpe-iot benchmark /tmp/iot_input.csv --compare zlib --preset generic
          /tmp/zpe_iot_fresh/bin/zpe-iot diagnostics --json

      - name: Generate release checksums
        run: python ../scripts/generate_checksums.py --output ../validation/results/ci_release_checksums.txt

  strict_dt_smoke:
    name: Strict DT Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./python[dev]

      - name: Strict DT smoke subset
        run: python validation/destruct_tests/run_all_dts.py --strict-gates --dt 18

  benchmark_sanity:
    name: Benchmark + Report Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./python[dev]

      - name: Run benchmark suite
        run: python validation/benchmarks/run_benchmarks.py

      - name: Generate benchmark report
        run: python validation/benchmarks/generate_report.py

  security_provenance:
    name: Security + Provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./python[dev]
          pip install pip-audit cyclonedx-bom

      - name: Install Rust security/provenance tooling
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-cyclonedx --locked

      - name: Run security scan
        run: python scripts/security_scan.py

      - name: Generate release artifacts (SBOM + manifests)
        run: python scripts/generate_release_artifacts.py

      - name: Generate release checksums
        run: python scripts/generate_checksums.py --output validation/results/ci_release_checksums.txt
