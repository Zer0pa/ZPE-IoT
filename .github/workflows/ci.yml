name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust:
    name: Rust Test + Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo Test
        run: cargo test --all-targets --release

      - name: Cargo Clippy (warnings denied)
        run: cargo clippy --all-targets -- -D warnings

  package_matrix:
    name: Matrix Build + Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin

      - name: Cargo Test
        run: cargo test --manifest-path core/Cargo.toml --release

      - name: Build wheel
        run: python -m maturin build --release --manifest-path python/native/Cargo.toml --out python/dist

      - name: Install editable package
        run: python -m pip install -e "./python[dev]"

      - name: Pytest
        run: python -m pytest python/tests -v

  strict_dt_smoke:
    name: Strict DT Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./python[dev]"

      - name: Strict DT smoke subset
        run: |
          python validation/destruct_tests/dt17_provenance_integrity.py
          python validation/destruct_tests/run_all_dts.py --strict-gates --dt 18

  benchmark_sanity:
    name: Benchmark Export Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./python[dev]"

      - name: Export public benchmark receipts
        run: python validation/benchmarks/export_public_benchmarks.py

  security_provenance:
    name: Security + Provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./python[dev]"

      - name: Install Rust security/provenance tooling
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-cyclonedx --locked

      - name: Run security scan
        run: python scripts/security_scan.py

      - name: Generate release artifacts (SBOM + manifests)
        run: python scripts/generate_release_artifacts.py
